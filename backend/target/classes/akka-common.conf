# ───────────────────────────────────────────────
# JobGraph AI — Akka Cluster base config
# Overridden per-node in application-node*.conf
# ───────────────────────────────────────────────

akka {
  actor {
    provider = "cluster"

    serializers {
      jackson-cbor = "akka.serialization.jackson.JacksonCborSerializer"
    }

    serialization-bindings {
      "com.jobgraph.message.CborSerializable" = jackson-cbor
    }
  }

  remote.artery {
    canonical {
      hostname = "127.0.0.1"
      port = 2551
    }
  }

  cluster {
    seed-nodes = [
      "akka://JobGraphCluster@127.0.0.1:2551"
      "akka://JobGraphCluster@127.0.0.1:2552"
    ]

    downing-provider-class = "akka.cluster.sbr.SplitBrainResolverProvider"
    split-brain-resolver {
      active-strategy = "keep-majority"
    }

    roles = ["worker"]
  }
}
