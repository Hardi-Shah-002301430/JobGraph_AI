server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: jobgraph-backend

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/jobgraph}
    username: ${DB_USER:jobgraph}
    password: ${DB_PASSWORD:jobgraph}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10

  jpa:
    hibernate:
      ddl-auto: validate     # use create_schema.sql instead
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false

  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

jobgraph:
  akka:
    config-file: ${AKKA_CONFIG:akka-common.conf}

  polling:
    interval-minutes: 15

  matching:
      alert-threshold: ${MATCH_ALERT_THRESHOLD:50}
  adzuna:
    app-id:  ${ADZUNA_APP_ID:}
    app-key: ${ADZUNA_APP_KEY:}

  demo:
    mode: true

  llm:
    provider: ${LLM_PROVIDER:groq}
    api-key: ${LLM_API_KEY:}
    model: ${LLM_MODEL:llama3-70b-8192}
    base-url: ${LLM_BASE_URL:https://api.groq.com/openai/v1}

  slack:
    webhook-url: ${SLACK_WEBHOOK_URL:}
    channel: ${SLACK_CHANNEL:#jobgraph-alerts}
  
  email:
    enabled: true
    imap-host: imap.gmail.com
    imap-port: 993
    username: hardishah1101@gmail.com
    password: "xehsqmnlikvfitek"
    folder: INBOX
    fetch-batch-size: 1
    poll-interval-minutes: 1

logging:
  level:
    root: INFO
    com.jobgraph: DEBUG
    akka: INFO
